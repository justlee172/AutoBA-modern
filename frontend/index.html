<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBA</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #111; min-height: 100vh; font-family: -apple-system, sans-serif; }
        .scroll::-webkit-scrollbar { width: 4px; }
        .scroll::-webkit-scrollbar-track { background: #1a1a1a; }
        .scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API = '';
        
        function Terminal({ outputs, running }) {
            const box = useRef(null);
            
            // 处理动画消息，只保留最新的一个
            const processedOutputs = outputs.reduce((acc, curr) => {
                if (curr.output.includes('[AI Thinking...]') || curr.output.includes('[AI Executing...]')) {
                    // 检查最后一个消息是否也是动画消息
                    const lastOutput = acc[acc.length - 1];
                    if (lastOutput && (lastOutput.output.includes('[AI Thinking...]') || lastOutput.output.includes('[AI Executing...]'))) {
                        // 替换最后一个动画消息
                        acc[acc.length - 1] = curr;
                    } else {
                        // 添加新的动画消息
                        acc.push(curr);
                    }
                } else {
                    // 非动画消息正常添加
                    acc.push(curr);
                }
                return acc;
            }, []);
            
            useEffect(() => { if(box.current) box.current.scrollTop = box.current.scrollHeight; }, [processedOutputs]);
            
            const getType = (msg) => {
                if (msg.includes('ERROR') || msg.includes('错误')) return 'error';
                if (msg.includes('完成') || msg.includes('成功') || msg.includes('TASK COMPLETED')) return 'success';
                return 'info';
            };
            
            return (
                <div className="bg-black rounded-lg overflow-hidden">
                    <div className="bg-[#1a1a1a] px-4 py-2 flex items-center gap-2 border-b border-[#222]">
                        <div className="w-3 h-3 rounded-full bg-red-500"></div>
                        <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                        <div className="w-3 h-3 rounded-full bg-green-500"></div>
                        <span className="ml-4 text-gray-500 text-xs">AutoBA Terminal</span>
                    </div>
                    <div ref={box} className="p-4 h-[400px] overflow-y-auto scroll font-mono text-xs">
                        {processedOutputs.length === 0 ? (
                            <div className="text-gray-500 text-center py-16">等待输出...</div>
                        ) : processedOutputs.map((o, i) => (
                            <div key={i} className={`py-1 ${getType(o.output) === 'error' ? 'text-red-400' : getType(o.output) === 'success' ? 'text-green-400' : 'text-gray-300'}`}>
                                {o.output}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        
        function App() {
            const [tab, setTab] = useState('new');
            const [task, setTask] = useState(null);
            const [logs, setLogs] = useState([]);
            const [running, setRunning] = useState(false);
            const [paused, setPaused] = useState(false);
            const [goal, setGoal] = useState('');
            const [desc, setDesc] = useState('');
            const [model, setModel] = useState('kimi');
            const [key, setKey] = useState('');
            const [exec, setExec] = useState(true);
            const [files, setFiles] = useState([]);
            const [steps, setSteps] = useState([]);
            const [currentStep, setCurrentStep] = useState(0);
            const [totalSteps, setTotalSteps] = useState(0);
            
            const esRef = useRef(null);
            
            const [completed, setCompleted] = useState(false);
            
            // 定期获取步骤状态
            useEffect(() => {
                const fetchSteps = async () => {
                    if (!task) return;
                    try {
                        const r = await fetch(`${API}/task/${task.task_id}/steps`);
                        const d = await r.json();
                        setSteps(d.steps || []);
                        setCurrentStep(d.current_step || 0);
                        setTotalSteps(d.total_steps || 0);
                    } catch(err) {
                        console.error('获取步骤状态失败:', err);
                    }
                };
                
                fetchSteps();
                
                let interval;
                if (task && (running || paused)) {
                    interval = setInterval(fetchSteps, 3000); // 每3秒获取一次
                }
                
                return () => {
                    if (interval) clearInterval(interval);
                };
            }, [task, running, paused, completed]);
            
            useEffect(() => {
                if (!task || (!running && !paused)) return;
                if (esRef.current) esRef.current.close();
                const es = new EventSource(`${API}/task/${task.task_id}/stream`);
                esRef.current = es;
                es.onmessage = (e) => {
                    try {
                        const d = JSON.parse(e.data);
                        setLogs(l => [...l, d]);
                        if (d.status === 'paused') {
                            setPaused(true);
                        } else if (d.status === 'running') {
                            setPaused(false);
                            setRunning(true);
                        } else if (d.status === 'completed' || d.status === 'failed' || d.status === 'stopped') {
                            setRunning(false);
                            setPaused(false);
                            if (d.status === 'completed') {
                                setCompleted(true);
                            }
                        }
                    } catch(err) {}
                };
                return () => es.close();
            }, [task, running, paused]);
            
            const downloadResults = async () => {
                if (!task) return;
                try {
                    const r = await fetch(`${API}/task/${task.task_id}/download`);
                    if (r.ok) {
                        const blob = await r.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `autoba-results-${task.task_id}.zip`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }
                } catch(err) {
                    setLogs(l => [...l, {output:'错误: '+err.message}]);
                }
            };
            
            const start = async () => {
                if (!goal.trim()) return alert('请输入分析目标');
                if (!key.trim()) return alert('请输入API Key');
                setLogs([{output: '初始化...', timestamp: new Date().toISOString()}]);
                setRunning(true);
                try {
                    const fd = new FormData();
                    fd.append('goal', goal);
                    fd.append('model_engine', model);
                    fd.append('openai_api', key);
                    fd.append('execute', exec);
                    fd.append('file_descriptions', desc);
                    
                    // 添加文件
                    files.forEach(file => {
                        fd.append('files', file);
                    });
                    
                    const r = await fetch(`${API}/task/create`, {method:'POST', body:fd});
                    const d = await r.json();
                    setTask({task_id: d.task_id});
                    setTab('terminal');
                } catch(err) {
                    setLogs(l => [...l, {output:'错误: '+err.message}]);
                    setRunning(false);
                }
            };
            
            const handleFileChange = (e) => {
                const selectedFiles = Array.from(e.target.files);
                setFiles(selectedFiles);
            };
            
            const pauseTask = async () => {
                if (!task) return;
                try {
                    const r = await fetch(`${API}/task/${task.task_id}/pause`, {method:'POST'});
                    const d = await r.json();
                    if (d.status === 'paused') {
                        setPaused(true);
                        setLogs(l => [...l, {output: '任务已暂停', timestamp: new Date().toISOString()}]);
                    }
                } catch(err) {
                    setLogs(l => [...l, {output:'错误: '+err.message}]);
                }
            };

            const resumeTask = async () => {
                if (!task) return;
                try {
                    const r = await fetch(`${API}/task/${task.task_id}/resume`, {method:'POST'});
                    const d = await r.json();
                    if (d.status === 'running') {
                        setPaused(false);
                        setLogs(l => [...l, {output: '任务已继续', timestamp: new Date().toISOString()}]);
                    }
                } catch(err) {
                    setLogs(l => [...l, {output:'错误: '+err.message}]);
                }
            };

            const stopTask = async () => {
                if (!task) return;
                try {
                    const r = await fetch(`${API}/task/${task.task_id}/stop`, {method:'POST'});
                    const d = await r.json();
                    if (d.status === 'stopped') {
                        setRunning(false);
                        setPaused(false);
                        setLogs(l => [...l, {output: '任务已结束', timestamp: new Date().toISOString()}]);
                    }
                } catch(err) {
                    setLogs(l => [...l, {output:'错误: '+err.message}]);
                }
            };
            
            return (
                <div className="min-h-screen text-white">
                    <nav className="bg-[#141414] border-b border-[#222] px-6 py-3">
                        <h1 className="text-xl font-bold">AutoBA - 自动化生物信息学分析</h1>
                    </nav>
                    
                    <main className="max-w-4xl mx-auto p-6">
                        <div className="flex gap-2 mb-6">
                            <button onClick={()=>setTab('new')} className={`px-4 py-2 rounded text-sm ${tab==='new'?'bg-blue-600':'bg-[#1a1a1a]'}`}>新建分析</button>
                            <button onClick={()=>setTab('terminal')} className={`px-4 py-2 rounded text-sm ${tab==='terminal'?'bg-blue-600':'bg-[#1a1a1a]'}`}>终端 {running && <span className="ml-1 w-2 h-2 bg-green-400 rounded-full inline-block"></span>}</button>
                        </div>
                        
                        {tab === 'new' && (
                            <div className="space-y-6">
                                {/* 功能介绍 */}
                                <div className="bg-[#1a1a1a] rounded-lg p-4">
                                    <h3 className="text-sm font-medium mb-3">当前支持的功能</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <h4 className="text-xs text-gray-400 mb-2">基因组学分析</h4>
                                            <ul className="text-xs text-gray-300 space-y-1">
                                                <li>• 序列比对（bowtie2）</li>
                                                <li>• 基因组组装（spades）</li>
                                                <li>• 组装质量评估（quast）</li>
                                                <li>• 数据预处理（trimmomatic）</li>
                                                <li>• BAM文件处理（samtools）</li>
                                            </ul>
                                        </div>
                                        <div>
                                            <h4 className="text-xs text-gray-400 mb-2">支持的文件格式</h4>
                                            <ul className="text-xs text-gray-300 space-y-1">
                                                <li>• FASTA格式（参考基因组）</li>
                                                <li>• FASTQ格式（测序数据）</li>
                                                <li>• 支持压缩格式（.gz）</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="space-y-4">
                                        <div className="bg-[#1a1a1a] rounded-lg p-4">
                                            <label className="block text-xs text-gray-400 mb-2">分析目标 *</label>
                                            <textarea value={goal} onChange={e=>setGoal(e.target.value)} className="w-full h-24 bg-[#0d0d0d] border border-[#222] rounded p-3 text-sm resize-none" placeholder="例如：进行基因组组装"/>
                                        </div>
                                        <div className="bg-[#1a1a1a] rounded-lg p-4">
                                            <label className="block text-xs text-gray-400 mb-2">上传文件</label>
                                            <input type="file" multiple onChange={handleFileChange} className="w-full text-sm text-gray-300 bg-[#0d0d0d] border border-[#222] rounded p-2.5"/>
                                            {files.length > 0 && (
                                                <div className="mt-2 space-y-1">
                                                    <div className="text-xs text-gray-400">已选择 {files.length} 个文件：</div>
                                                    {files.map((file, index) => (
                                                        <div key={index} className="text-xs text-gray-300">{file.name} ({(file.size / 1024).toFixed(1)}KB)</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        <div className="bg-[#1a1a1a] rounded-lg p-4">
                                            <label className="block text-xs text-gray-400 mb-2">文件描述</label>
                                            <textarea value={desc} onChange={e=>setDesc(e.target.value)} className="w-full h-20 bg-[#0d0d0d] border border-[#222] rounded p-3 text-sm resize-none"/>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="bg-[#1a1a1a] rounded-lg p-4">
                                            <label className="block text-xs text-gray-400 mb-2">模型</label>
                                            <select value={model} onChange={e=>setModel(e.target.value)} className="w-full bg-[#0d0d0d] border border-[#222] rounded p-2.5 text-sm">
                                                <option value="kimi">Kimi</option>
                                                <option value="gpt-4o">GPT-4o</option>
                                            </select>
                                        </div>
                                        <div className="bg-[#1a1a1a] rounded-lg p-4">
                                            <label className="block text-xs text-gray-400 mb-2">API Key *</label>
                                            <input type="password" value={key} onChange={e=>setKey(e.target.value)} className="w-full bg-[#0d0d0d] border border-[#222] rounded p-2.5 text-sm" placeholder="输入API Key"/>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <input type="checkbox" checked={exec} onChange={e=>setExec(e.target.checked)} className="w-4 h-4"/>
                                            <label className="text-sm">自动执行代码</label>
                                        </div>
                                        <button onClick={start} disabled={running} className={`w-full py-3 rounded-lg font-medium text-sm ${running?'bg-gray-600':'bg-blue-600'}`}>
                                            {running ? '运行中...' : '开始分析'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {tab === 'terminal' && (
                            <div className="space-y-4">
                                <Terminal outputs={logs} running={running}/>
                                
                                {/* 步骤状态显示 */}
                                {steps.length > 0 && (
                                    <div className="bg-[#1a1a1a] rounded-lg p-4">
                                        <h3 className="text-sm font-medium mb-3">执行步骤</h3>
                                        <div className="space-y-2">
                                            {steps.map((step, index) => (
                                                <div key={step.id} className="flex items-start gap-3">
                                                    <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${step.status === 'completed' ? 'bg-green-600' : step.status === 'running' ? 'bg-blue-600' : step.status === 'failed' ? 'bg-red-600' : 'bg-gray-600'}`}>
                                                        {step.status === 'completed' ? '✓' : step.status === 'running' ? '▶' : step.status === 'failed' ? '✗' : step.id}
                                                    </div>
                                                    <div className="flex-1">
                                                        <div className="text-sm font-medium">步骤 {step.id}</div>
                                                        <div className="text-xs text-gray-300 mt-1">{step.description}</div>
                                                        {step.status === 'completed' && step.execution_info && (
                                                            <div className="text-xs text-gray-400 mt-1">{step.execution_info}</div>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                
                                {(running || paused) && task && (
                                    <div className="flex gap-2">
                                        {paused ? (
                                            <button onClick={resumeTask} className="px-4 py-2 bg-green-600 rounded text-sm">继续</button>
                                        ) : (
                                            <button onClick={pauseTask} className="px-4 py-2 bg-yellow-600 rounded text-sm">暂停</button>
                                        )}
                                        <button onClick={stopTask} className="px-4 py-2 bg-red-600 rounded text-sm">结束</button>
                                    </div>
                                )}
                                {completed && task && (
                                    <div className="flex gap-2">
                                        <button onClick={downloadResults} className="px-4 py-2 bg-blue-600 rounded text-sm">下载结果</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
