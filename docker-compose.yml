version: '3.8'

services:
  autoba:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
